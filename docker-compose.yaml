services:
  postgres:
    image: postgres:15
    container_name: ${POSTGRES_CONTAINER_NAME:-my_postgres}
    restart: always
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-data-enrichment-redis}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  nats:
    image: nats:2.10-alpine
    container_name: ${NATS_CONTAINER_NAME:-data-enrichment-nats}
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_HTTP_PORT:-8222}:8222"
    command:
      - nats-server
      - --jetstream
      - --http_port
      - "8222"

volumes:
  postgres_data:
  redis_data:
