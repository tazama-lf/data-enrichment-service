version: "3.9"
services:
  postgres:
    image: postgres:15
    container_name: my_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: data-enrichment-redis
    command: redis-server --requirepass redis-password
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nats:
    image: nats:2.10-alpine
    container_name: data-enrichment-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: [ "nats-server", "--jetstream", "--http_port", "8222" ]

volumes:
  postgres_data:
  redis_data:
